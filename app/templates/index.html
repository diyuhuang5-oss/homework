<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>硬體價格衰減分析系統</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background-color: #f8f9fa; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
        .card { box-shadow: 0 4px 6px rgba(0,0,0,0.1); border: none; border-radius: 12px; }
        .stat-value { font-size: 2rem; font-weight: bold; color: #0d6efd; }
    </style>
</head>
<body>
    <div class="container py-5">
        <h1 class="text-center mb-5">📱 科技產品價格分析戰情室</h1>
        
        <div class="row mb-4">
            <div class="col-md-4 mb-3">
                <div class="card h-100 text-center p-4">
                    <h5 class="text-muted">衰減係數 (k值)</h5>
                    <div class="stat-value" id="k-value">載入中...</div>
                </div>
            </div>
            <div class="col-md-4 mb-3">
                <div class="card h-100 text-center p-4">
                    <h5 class="text-muted">預估市場底價</h5>
                    <div class="stat-value" id="min-price">載入中...</div>
                </div>
            </div>
            <div class="col-md-4 mb-3">
                <div class="card h-100 text-center p-4">
                    <h5 class="text-muted">上市30個月預測價</h5>
                    <div class="stat-value" id="future-price">載入中...</div>
                </div>
            </div>
        </div>

        <div class="row">
            <div class="col-12">
                <div class="card p-4 text-center">
                    <h4 class="mb-4">數學模型預測曲線 (iPhone 14 Pro)</h4>
                    <img src="{{ url_for('static', filename='decay_curve.png') }}" class="img-fluid rounded" alt="價格衰減曲線圖" style="max-height: 500px; object-fit: contain;">
                </div>
            </div>
        </div>
    </div>

    <script>
        // 網頁載入完成後，立刻去要資料
        fetch('/api/analyze/Apple/iPhone 14 Pro')
            .then(response => response.json())
            .then(data => {
                if(data.status === "success") {
                    // 將 API 回傳的數字填入 HTML 標籤中
                    document.getElementById('k-value').innerText = data.data.analysis.decay_coefficient_k;
                    document.getElementById('min-price').innerText = "$ " + data.data.analysis.estimated_minimum_price.toLocaleString();
                    document.getElementById('future-price').innerText = "$ " + data.data.analysis.predicted_price_month_30.toLocaleString();
                } else {
                    alert("獲取資料失敗：" + data.message);
                }
            })
            .catch(error => console.error('Error:', error));
    </script>
</body>
</html>
